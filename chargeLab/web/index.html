<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChargeLab Web Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>ChargeLab Web</h1>

        <canvas id="simCanvas" width="900" height="700"></canvas>

        <section class="controls">
            <button id="pauseButton" type="button">Pause</button>
            <button id="clearButton" type="button">Clear</button>

            <!-- Particle controls -->
            <button id="selectedModeButton" type="button">Select/Drag</button>
            <button id="positiveModeButton" type="button">Add +</button>
            <button id="negativeModeButton" type="button">Add -</button>

            <!-- Fixed Button -->
            <button id="fixedButton" type="button">Fix Selected</button>
        </section>
    </main>

    <script src="app.js"></script>
    <script src="chargeLab.js"></script>
    
</body>
</html>
