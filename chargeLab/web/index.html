<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChargeLab Web Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>ChargeLab Web</h1>

        <canvas id="simCanvas" width="900" height="700"></canvas>

        <section class="controls">
            <button id="pauseButton" type="button">Pause</button>
            <button id="clearButton" type="button">Clear</button>

            <!-- Particle controls -->
            <button id="selectedModeButton" type="button">Select/Drag</button>
            <button id="positiveModeButton" type="button">Add +</button>
            <button id="negativeModeButton" type="button">Add -</button>

            <!-- Fixed Button -->
            <button id="fixedButton" type="button">Fix Selected</button>
        </section>

        <section class="selected-panel">
            <h2>Selected Particle</h2>

            <p id="selectedStatus">No particle selected</p>

            <p>Charge: <span id="selectedCharge">--</span></p>
            <p>Mass: <span id="selectedMass">--</span></p>
            <p>Radius: <span id="selectedRadius">--</span></p>
            <p>Position: <span id="selectedPosition">--</span></p>
            <p>Velocity: <span id="selectedVelocity">--</span></p>
            <p>Fixed: <span id="selectedFixed">--</span></p>
        </section>

        <div class="selected-editor">
            <h3>Edit Selected</h3>

            <label>
                Charge
                <input id="chargeInput" type="number" step="0.1">
            </label>

            <label>
                Mass
                <input id="massInput" type="number" step="0.1">
            </label>

            <label>
                Radius
                <input id="radiusInput" type="number" step="0.1">
            </label>

            <label>
                Velocity X
                <input id="vxInput" type="number" step="0.1">
            </label>

            <label>
                Veloxity Y
                <input id="vyInput" type="number" step="0.1">
            </label>


            <label>
                Position X
                <input id="xInput" type="number" step="0.1">
            </label>


            <label>
                Position Y
                <input id="yInput" type="number" step="0.1">
            </label>

            <button id="applySelectedButton" type="button">Apply Changes</button>
        </div>
    </main>

    <script src="app.js"></script>
    <script src="chargeLab.js"></script>
    
</body>
</html>
