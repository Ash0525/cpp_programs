<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChargeLab Web Test</title>
</head>
<body>
    <h1>ChargeLab WebAssembly Test</h1>
    <p>Open the browser console to see if the C++ Simulation loaded</p>

    <script>
        var Module = {
            onRuntimeInitialized: function () {
                console.log("ChargeLab WASM loaded!");

                const simulation = new Module.Simulation(900, 700);

                console.log("Initialz particle count: ", simulation.getParticleCount());

                simulation.addParticleAt(300, 350, 1.0);
                simulation.addParticleAt(600, 350, -1.0);

                // Testing certain methods
                console.log("Particle count after adding: ", simulation.getParticleCount());
                console.log("Particle 0 at x: ", simulation.getParticleX(0));
                console.log("Particle 0 at y: ", simulation.getParticleY(0));
                console.log("Particle 0 charge: ", simulation.getParticleCharge(0));

                window.simulation = simulation;
            }
        }
    </script>

    <script src="chargeLab.js"></script>
    
</body>
</html>
